<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate PDF - API Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }\n        @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }\n        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-24px); } to { opacity: 1; transform: translateX(0); } }\n        @keyframes slideInRight { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
        .gradient-animate { animation: gradient 12s ease infinite; }\n        .animate-fadeInUp { animation: fadeInUp .55s ease-out forwards; }\n        .animate-slideInLeft { animation: slideInLeft .55s ease-out forwards; }\n        .animate-slideInRight { animation: slideInRight .55s ease-out forwards; }\n        .delay-100 { animation-delay: .10s; opacity: 0; }\n        .delay-200 { animation-delay: .20s; opacity: 0; }\n        .delay-300 { animation-delay: .30s; opacity: 0; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-3px); box-shadow: 0 14px 24px -8px rgba(0,0,0,.15); }
        pre { white-space: pre-wrap; word-break: break-word; font-size: 0.66rem; line-height: 1.25; }
        code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
</head>
<body class="m-0 bg-gradient-to-br from-gray-50 via-blue-50 to-purple-50 min-h-screen flex flex-col gradient-animate" style="background-size: 400% 400%;">
    <nav class="bg-white shadow-md h-12 flex items-center justify-between px-6 flex-shrink-0 relative">
        <div class="flex items-center space-x-3"><img src="/logo.png" alt="Logo" class="h-8 w-auto max-w-[120px]" onerror="this.style.display='none'"></div>
        <h1 class="text-lg font-semibold text-gray-900 tracking-tight absolute left-1/2 -translate-x-1/2 pointer-events-none">API Playground</h1>
        <div class="flex space-x-4 flex-1 justify-end text-sm">
            <a href="/examples.html" class="px-3 py-1 rounded text-sm font-semibold text-gray-700 hover:bg-gray-100">Code Examples</a>
            <a href="/kyc-documentation.html" class="px-3 py-1 rounded text-sm font-semibold text-gray-700 hover:bg-gray-100">Documentation</a>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden" style="min-height: 0;">
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col flex-shrink-0">
            <div class="p-4 border-b bg-gradient-to-r from-purple-50 to-blue-50"><h2 class="text-base font-semibold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-blue-600">API Functions</h2></div>
            <div class="p-2">
                <div class="mb-4">
                    <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 px-2">API KEY</h3>
                    <button type="button" class="api-nav w-full text-left px-3 py-2 rounded-lg text-sm font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200" data-go="/apikey.html">
                        <div class="flex items-center"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>Generate API Key</div>
                    </button>
                </div>
                <div class="space-y-2">
                    <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 px-2">FUNCTIONS</h3>
                    <button type="button" class="api-nav w-full text-left px-3 py-2 rounded-lg text-sm font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200" data-go="/filesummary.html"><div class="flex items-center"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>File Summary</div></button>
                    <button type="button" class="api-nav w-full text-left px-3 py-2 rounded-lg text-sm font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200" data-go="/formdetails.html"><div class="flex items-center"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h10"></path></svg>Form Details</div></button>
                    <button type="button" class="api-nav w-full text-left px-3 py-2 rounded-lg text-sm font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200" data-go="/subformdetails.html"><div class="flex items-center"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5h14v4H5zM5 13h14v6H5z"></path></svg>SubForm Details</div></button>
                    <button type="button" class="api-nav w-full text-left px-3 py-2 rounded-lg text-sm font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200" data-go="/subformfields.html"><div class="flex items-center"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h10M7 12h10M7 17h6"></path></svg>SubForm Fields</div></button>
                    <button type="button" class="api-nav w-full text-left px-3 py-2 rounded-lg text-sm font-semibold bg-gradient-to-r from-purple-600 to-blue-600 text-white" data-go="/subformsubmitarchive.html"><div class="flex items-center"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h8M8 12h8M8 17h8"></path></svg>Generate PDF</div></button>
                    <button type="button" class="api-nav w-full text-left px-3 py-2 rounded-lg text-sm font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200" data-go="/getdatafromsalesforce.html"><div class="flex items-center"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h8M8 12h8M8 17h8"></path></svg>Get Data From Salesforce</div></button>
                    <button type="button" class="api-nav w-full text-left px-3 py-2 rounded-lg text-sm font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200" data-go="/kycagent.html"><div class="flex items-center"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>KYC Agent</div></button>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4">
            <div class="max-w-6xl mx-auto">
                <div class="text-center mb-6 animate-fadeInUp py-2">
                    <h2 class="text-3xl font-semibold text-gray-900">Generate PDF</h2>
                    <p class="text-gray-600 mt-1">One call: form entry submit + generate PDF upload/archive.</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-xl shadow-lg p-6 space-y-4 card-hover animate-slideInLeft delay-100">
                        <h3 class="text-lg font-semibold text-gray-900">Request</h3>
                        <input type="text" id="apiKey" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Playground API key *">
                        <input type="text" id="ezofisToken" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="Ezofis JWT *">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="formId" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="formId *" value="139">
                            <input type="number" id="templateId" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="templateId *" value="132">
                            <input type="number" id="entryIdForFormEntry" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="entryIdForFormEntry" value="0">
                            <input type="number" id="entryId" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="entryId (optional)" value="0">
                        </div>
                        <input type="text" id="panelName" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="panelName *" value="009 - Account Details.010 - Dealer Credit Details">
                        <label class="inline-flex items-center gap-2 text-sm"><input type="checkbox" id="isMultiple" class="rounded border-gray-300"> isMultiple</label>
                        <textarea id="fieldsJson" rows="10" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-xs font-mono" spellcheck="false">{
  "ed3dZq8mL_6QgGV26PAJj": "123456"
}</textarea>
                        <button type="button" id="submitBtn" class="w-full py-2.5 rounded-lg text-white font-medium bg-gradient-to-r from-cyan-500 to-teal-600">Submit + Archive</button>
                        <div id="errBox" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg p-3"></div>
                    </div>
                    <div class="bg-white rounded-xl shadow-lg p-6 card-hover animate-slideInRight delay-200">
                        <h3 class="text-lg font-semibold text-gray-900 mb-3">Response</h3>
                        <div id="outBox" class="space-y-3">
                            <div><span class="text-xs font-semibold text-gray-500">id</span><pre id="outId" class="mt-1 bg-gray-50 border rounded p-2"></pre></div>
                            <div><span class="text-xs font-semibold text-gray-500">output</span><pre id="outPlain" class="mt-1 bg-gray-50 border rounded p-2 max-h-96 overflow-auto"></pre></div>
                            <div><span class="text-xs font-semibold text-gray-500">encryptOutput</span><pre id="outEnc" class="mt-1 bg-gray-50 border rounded p-2 max-h-96 overflow-auto"></pre></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.querySelectorAll('.api-nav').forEach(btn => btn.addEventListener('click', () => { const url = btn.getAttribute('data-go'); if (url) window.location.href = url; }));
        const API_BASE = window.location.origin;
        function pretty(v){ try{ if(typeof v==='string'){ const t=v.trim(); if((t.startsWith('{')&&t.endsWith('}'))||(t.startsWith('[')&&t.endsWith(']'))) return JSON.stringify(JSON.parse(t),null,2);} return typeof v==='string'?v:JSON.stringify(v,null,2);}catch{return String(v??'');}}
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const btn = document.getElementById('submitBtn');
            const apiKey = document.getElementById('apiKey').value.trim();
            const ezofisToken = document.getElementById('ezofisToken').value.trim();
            const formId = parseInt(document.getElementById('formId').value, 10);
            const templateId = parseInt(document.getElementById('templateId').value, 10);
            const entryIdForFormEntry = parseInt(document.getElementById('entryIdForFormEntry').value || '0', 10);
            const entryId = parseInt(document.getElementById('entryId').value || '0', 10);
            const panelName = document.getElementById('panelName').value.trim();
            const isMultiple = document.getElementById('isMultiple').checked;
            let fields;
            try { fields = JSON.parse(document.getElementById('fieldsJson').value); } catch (e) { document.getElementById('errBox').textContent = 'Invalid fields JSON: ' + e.message; document.getElementById('errBox').classList.remove('hidden'); return; }
            if (!apiKey || !ezofisToken || !formId || !templateId || !panelName) { document.getElementById('errBox').textContent = 'apiKey, ezofisToken, formId, templateId, panelName required'; document.getElementById('errBox').classList.remove('hidden'); return; }
            document.getElementById('errBox').classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            try {
                const res = await fetch(`${API_BASE}/api/SubFormSubmitAndArchive`, {
                    method: 'POST',
                    headers: { 'Content-Type':'application/json', 'X-API-Key': apiKey, 'Ezofis-Token': ezofisToken },
                    body: JSON.stringify({ formId, templateId, entryIdForFormEntry, entryId, isMultiple, panelName, fields })
                });
                const data = await res.json().catch(()=>({}));
                if (!res.ok) {
                    document.getElementById('errBox').textContent = data.encryptOutput || data.message || res.statusText || 'Request failed';
                    document.getElementById('errBox').classList.remove('hidden');
                }
                document.getElementById('outId').textContent = String(data.id ?? '');
                document.getElementById('outPlain').textContent = pretty(data.output);
                document.getElementById('outEnc').textContent = pretty(data.encryptOutput);
                localStorage.setItem('subformsubmitarchive_data', JSON.stringify({ apiKey, ezofisToken, formId, templateId, entryIdForFormEntry, entryId, panelName, isMultiple, fieldsText: document.getElementById('fieldsJson').value }));
            } catch (e) {
                document.getElementById('errBox').textContent = e.message || String(e);
                document.getElementById('errBox').classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit + Archive';
            }
        });
        window.addEventListener('load', () => { try { const s=JSON.parse(localStorage.getItem('subformsubmitarchive_data')||'null'); if(!s) return; ['apiKey','ezofisToken','panelName'].forEach(k=>{ if(s[k]) document.getElementById(k).value=s[k];}); ['formId','templateId','entryIdForFormEntry','entryId'].forEach(k=>{ if(s[k]!==undefined) document.getElementById(k).value=s[k];}); if(s.isMultiple) document.getElementById('isMultiple').checked=true; if(s.fieldsText) document.getElementById('fieldsJson').value=s.fieldsText; } catch(_){} });
    </script>
</body>
</html>
